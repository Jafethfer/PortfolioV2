<div
  #stageEl
  class="stage stage-translate aspect-video bg-repeat-x flex items-end"
>
  <div class="misc-layer misc-translate w-full absolute bg-repeat-x"></div>
  <div class="w-full relative">
    <app-character
      [config]="characterConfig()"
      [blockedRight]="blockedRight()"
      [blockedLeft]="blockedLeft()"
      [worldWidth]="width()"
    />
    <div #trainEl class="train-bump w-full overflow-hidden">
      <img #trainImgEl class="w-[140%]" src="/assets/img/terry-train.png" alt="" />
    </div>
  </div>
</div>
