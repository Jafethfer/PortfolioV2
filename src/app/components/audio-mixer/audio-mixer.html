@if (!open()) {
  <button class="mixer-toggle" (click)="toggle()" aria-label="Show audio controls">
    <span aria-hidden="true">🔊</span>
  </button>
} @else {
  <!-- Backdrop: inert on desktop, a tap-to-close dim on compact/touch screens. -->
  <div class="mixer-scrim" (click)="toggle()"></div>
  <div class="mixer" role="dialog" aria-label="Audio">
    <div class="mixer-head">
      <span class="mixer-title">Audio</span>
      <button
        class="mixer-close"
        (click)="toggle()"
        aria-label="Hide audio controls"
      >&times;</button>
    </div>
    <label>
      <span>Music</span>
      <input
        type="range" min="0" max="1" step="0.01"
        [value]="audio.musicVolume()"
        (input)="audio.musicVolume.set($any($event.target).valueAsNumber)"
      />
    </label>
    <label>
      <span>SFX</span>
      <input
        type="range" min="0" max="1" step="0.01"
        [value]="audio.sfxVolume()"
        (input)="audio.sfxVolume.set($any($event.target).valueAsNumber)"
      />
    </label>
    <label>
      <span>Voices</span>
      <input
        type="range" min="0" max="1" step="0.01"
        [value]="audio.voiceVolume()"
        (input)="audio.voiceVolume.set($any($event.target).valueAsNumber)"
      />
    </label>
  </div>
}
