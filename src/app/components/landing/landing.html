<div
  class="landing aspect-video relative flex flex-col items-center justify-center overflow-hidden text-center text-white"
>
  <div class="content px-[6cqw]">
    <p class="kicker uppercase text-white/45">Interactive Portfolio</p>

    <h1 class="title font-black leading-none tracking-tight">
      Jafeth<span class="text-amber-400">.</span>
    </h1>

    <p class="intro mx-auto text-white/70 leading-relaxed">
      Welcome. This portfolio is an interactive stage — take control of the
      fighter, walk through my work, and explore as you go.
      <span class="text-white/90">[Add a line or two about yourself here.]</span>
    </p>

    <div class="loader mx-auto">
      <div class="track relative overflow-hidden rounded-full bg-white/10">
        <div class="fill absolute inset-y-0 left-0 rounded-full" [style.width.%]="percent()"></div>
      </div>

      <button
        type="button"
        class="start"
        [class.ready]="ready()"
        [disabled]="!ready()"
        (click)="start()"
      >
        @if (ready()) {
          Press Start
        } @else {
          Loading… {{ percent() }}%
        }
      </button>
    </div>
  </div>
</div>
